# Simple workflow for deploying static content to GitHub Pages with Vite for the Course Scheduler Guide
name: Deploy static content to Pages

on:
  # Runs on pushes targeting standard default branches
  push:
    branches: ["main", "master", "dev"]

  # Allows you to run this workflow manually from the Actions tab on your Repo
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to prevent race conditions during updates
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job for standard static applications
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json found. Installing with npm ci..."
            npm ci
          else
            echo "No package-lock.json found. Installing with npm install..."
            npm install
          fi

      - name: Build Production Bundle
        run: npm run build

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload Vite Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the static output directory built by Vite
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
