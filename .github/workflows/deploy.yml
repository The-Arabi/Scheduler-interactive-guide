# Deploy the full Node app (guide UI + /proxy-site reverse proxy).
# GitHub Pages static-only hosting cannot run the proxy — that caused 404s on /proxy-site/...
name: Deploy full-stack app

on:
  push:
    branches: ["main", "master", "dev"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Typecheck
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Optional: trigger a Render deploy when RENDER_DEPLOY_HOOK is configured in repo secrets.
  deploy-render:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
